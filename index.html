<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>My To-Do List</h1>
            <p>Organize your tasks efficiently</p>
        </header>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task..." class="task-input" autocomplete="off">
            <input type="date" id="dueDateInput" class="task-input due-date-input" required>
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <!-- Task Counter -->
        <div class="task-counter">
            <span id="taskCount">0</span> task(s)
        </div>

        <!-- Task List Container -->
        <div class="task-list-section">
            <ul id="taskList" class="task-list">
                <!-- Tasks will be dynamically added here -->
            </ul>
        </div>

        <!-- Empty State Message -->
        <div id="emptyMessage" class="empty-message">
            <p>No tasks yet. Add one to get started! 🎯</p>
        </div>
    </div>

    <!-- Link to JavaScript file -->
    <script src="script.js"></script>
</body>

</html>
